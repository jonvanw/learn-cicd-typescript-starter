name: cd

on:
  push:
    branches: [main]

jobs:
    deploy:
        name: Deploy
        runs-on: ubuntu-latest

        steps:
            - name: Check out code
              uses: actions/checkout@v7

            - name: Set up Node
              uses: actions/setup-node@v6
              with:
                node-version: 24

            - name: Install dependencies
              run: npm ci

            - name: Build project
              run: npm run build

            - id: 'auth'
              uses: 'google-github-actions/auth@v2'
              with:
                credentials_json: '${{ secrets.GCP_CREDENTIALS }}'

            - name: 'Set up Cloud SDK'
              uses: 'google-github-actions/setup-gcloud@v3'

            - name: deploy docker container to gcr
              run: gcloud builds submit --tag us-central1-docker.pkg.dev/notely-500323/notely-ar-repo/notely:latest .
            # - name: Deploy to production
            #   run: npm run deploy