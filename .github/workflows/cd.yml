name: cd

on:
  push:
    branches: [main]

jobs:
    deploy:
        name: Deploy
        runs-on: ubuntu-latest

        steps:
            - name: Check out code
              uses: actions/checkout@v7

            - name: Set up Node
              uses: actions/setup-node@v6
              with:
                node-version: 24

            - name: Install dependencies
              run: npm ci

            - name: Build project
              run: npm run build

            # - name: Deploy to production
            #   run: npm run deploy